# ─── Nest Config ────────────────────────────────────────────
# Run `npm run init` to generate this interactively.

instance:
    name: "default"
    dataDir: "."
    pluginsDir: "./plugins"
    agentDir: "./.pi/agent"    # pi config (models, sessions) — isolated from ~/.pi/agent/

# ─── Sessions ───────────────────────────────────────────────
# Sessions are independent pi processes. Listeners attach to them.
# Cron jobs target them. Multiple listeners can watch the same session.

sessions:
    default:
        pi:
            cwd: /home/user
            # extensions:
            #     - /path/to/extension.ts
    # background:
    #     pi:
    #         cwd: /home/user
    #     idleTimeoutMinutes: 30

defaultSession: default

# ─── Server ─────────────────────────────────────────────────

# server:
#     port: 8484
#     token: "nest_your-generated-token"
#     host: "127.0.0.1"

# ─── Cron ───────────────────────────────────────────────────

# cron:
#     dir: ./cron.d
#     gracePeriodMs: 5000

# ─── Usage Tracking ─────────────────────────────────────────

tracking:
    usageLog: ./usage.jsonl
    capacity: 1000
    retentionDays: 30

# ─── Plugin Config ──────────────────────────────────────────
# Plugins read their own sections. The kernel doesn't validate these.

# discord:
#     token: "env:DISCORD_TOKEN"
#     channels:
#         "1234567890": "default"

# matrix:
#     homeserver: https://matrix.example.org
#     user: "@bot:example.org"
#     token: "env:MATRIX_TOKEN"
#     channels:
#         "!room:example.org": "default"
