# ─── Nest Config ────────────────────────────────────────────
# Run `nest init` to generate this interactively.

instance:
    name: "default"
    dataDir: "."
    pluginsDir: "./plugins"
    agentDir: "./.pi/agent"    # pi config (models, sessions) — isolated from ~/.pi/agent/
    # sandbox:
    #     enabled: true
    #     image: "nest:latest"
    #     network: "host"
    #     extraMounts:
    #         - "/data/shared:/shared:ro"
    #     extraEnv:
    #         SOME_VAR: "value"

# ─── Sessions ───────────────────────────────────────────────

sessions:
    default:
        pi:
            cwd: /home/user
            # extensions:
            #     - /path/to/extension.ts

defaultSession: default

# ─── Server ─────────────────────────────────────────────────

# server:
#     port: 8484
#     token: "nest_your-generated-token"
#     host: "127.0.0.1"

# ─── Cron ───────────────────────────────────────────────────

# cron:
#     dir: ./cron.d
#     gracePeriodMs: 5000

# ─── Usage Tracking ─────────────────────────────────────────

tracking:
    usageLog: ./usage.jsonl
    capacity: 1000
    retentionDays: 30

# ─── Plugin Config ──────────────────────────────────────────
# Plugins read their own sections. The kernel doesn't validate these.

# discord:
#     token: "env:DISCORD_TOKEN"
#     channels:
#         "1234567890": "default"

# matrix:
